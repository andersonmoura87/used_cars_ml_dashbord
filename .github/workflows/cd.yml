name: CD — Production Deploy

on:
  push:
    tags:
      - 'v*'

# M-10 FIX: least-privilege por job
permissions:
  contents: read

jobs:
  # ── 1. Staging gate (smoke tests obrigatórios antes da produção) ────────────
  staging-gate:
    name: Staging Gate
    uses: ./.github/workflows/staging.yml
    # H-10 FIX: apenas secrets necessários, não `secrets: inherit`
    secrets:
      STAGING_API_KEY: ${{ secrets.STAGING_API_KEY }}

  # ── 2. Verificar modelo em Production no MLflow Registry ───────────────────
  check-model:
    name: Verify Production Model
    runs-on: ubuntu-latest
    needs: staging-gate

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install mlflow
        run: pip install mlflow==2.19.0

      # H-15 FIX: ausência de modelo Production bloqueia o deploy
      - name: Check Production model exists
        env:
          MLFLOW_TRACKING_URI:     ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_REGISTERED_MODEL: ${{ secrets.MLFLOW_REGISTERED_MODEL }}
        run: |
          python - <<'PY'
          import os, sys
          import mlflow
          from mlflow.tracking import MlflowClient

          uri = os.getenv("MLFLOW_TRACKING_URI", "")
          if not uri:
              print("MLFLOW_TRACKING_URI não configurado — pulando verificação de modelo")
              sys.exit(0)

          mlflow.set_tracking_uri(uri)
          client = MlflowClient()
          model_name = os.environ.get("MLFLOW_REGISTERED_MODEL", "used_cars_price_model")

          try:
              versions = client.get_latest_versions(model_name, stages=["Production"])
              if not versions:
                  # H-15 FIX: falhar o job, não apenas warning
                  print(f"::error::Nenhum modelo '{model_name}' em Production. "
                        "Execute: python scripts/promote_model.py --from-stage Staging --to Production")
                  sys.exit(1)
              v = versions[0]
              print(f"Modelo Production: {model_name} v{v.version} (run: {v.run_id})")
          except Exception as e:
              print(f"::error::Falha ao verificar registry MLflow: {e}")
              sys.exit(1)
          PY

  # ── 3. Deploy para produção ───────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [staging-gate, check-model]
    environment: production

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run database migrations
        env:
          DB_HOST:     ${{ secrets.DB_HOST }}
          DB_PORT:     ${{ secrets.DB_PORT }}
          DB_NAME:     ${{ secrets.DB_NAME }}
          DB_USER:     ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: python scripts/run_migration.py

      # H-09 FIX: deploy por imagem imutável do registry, não git pull
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          port:     ${{ secrets.SSH_PORT }}
          envs:     DOCKER_IMAGE
          script: |
            set -e
            cd /opt/used-cars-analysis

            # Guardar ID de container atual para rollback
            PREV_ID=$(docker ps -q -f name=used_cars_ml_dashbord-app-1 2>/dev/null || echo "")

            # Pull da imagem imutável pelo SHA (não git pull)
            docker pull "$DOCKER_IMAGE"
            DOCKER_IMAGE="$DOCKER_IMAGE" docker compose up -d --remove-orphans

            # Verificar saúde pós-deploy (30s)
            sleep 15
            if ! curl -sf http://localhost:8000/health; then
              echo "Health check falhou — revertendo"
              docker compose down
              if [ -n "$PREV_ID" ]; then
                docker start "$PREV_ID"
              fi
              exit 1
            fi

            docker image prune -f
            echo "Deploy concluído"
        env:
          DOCKER_IMAGE: ghcr.io/${{ github.repository_owner }}/used-cars-ml:sha-${{ github.sha }}

      - name: Notify success
        if: success()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: ":rocket: Deploy *${{ github.ref_name }}* em produção com sucesso!"
          SLACK_COLOR: good

      - name: Notify failure
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: ":fire: Deploy *${{ github.ref_name }}* FALHOU — rollback executado"
          SLACK_COLOR: danger
