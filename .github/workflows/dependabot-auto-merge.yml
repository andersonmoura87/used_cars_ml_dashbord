name: Dependabot Auto-merge

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-merge Dependabot patch/minor
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]'

    steps:
      - uses: actions/checkout@v6

      - name: Get PR number from workflow run
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          PR_NUMBER=$(gh pr list --state open \
            --json number,headRefOid \
            --jq ".[] | select(.headRefOid == \"$HEAD_SHA\") | .number" | head -1)
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Fetch Dependabot metadata
        id: metadata
        if: steps.pr.outputs.number != ''
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          pr-number: ${{ steps.pr.outputs.number }}

      - name: Approve patch or minor updates
        if: |
          steps.pr.outputs.number != '' &&
          (steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
           steps.metadata.outputs.update-type == 'version-update:semver-minor')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          gh pr review "$PR_NUMBER" \
            --approve \
            --body "Auto-aprovado: patch/minor sem breaking changes esperadas."

      - name: Enable auto-merge for patch or minor
        if: |
          steps.pr.outputs.number != '' &&
          (steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
           steps.metadata.outputs.update-type == 'version-update:semver-minor')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: gh pr merge "$PR_NUMBER" --auto --squash

      - name: Label and comment major bumps for manual review
        if: |
          steps.pr.outputs.number != '' &&
          steps.metadata.outputs.update-type == 'version-update:semver-major'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          DEP_NAMES: ${{ steps.metadata.outputs.dependency-names }}
          PREV_VERSION: ${{ steps.metadata.outputs.previous-version }}
          NEW_VERSION: ${{ steps.metadata.outputs.new-version }}
        run: |
          gh pr edit "$PR_NUMBER" --add-label "major-version-bump" 2>/dev/null || true
          BODY="Major version bump detected -- manual review required before merging."
          BODY="$BODY Package: $DEP_NAMES  Version: $PREV_VERSION -> $NEW_VERSION"
          BODY="$BODY Please check the CHANGELOG for breaking changes before approving."
          gh pr comment "$PR_NUMBER" --body "$BODY"
