name: Staging Deploy + Smoke Tests

on:
  push:
    branches: [master, main]
  workflow_call:          # permite ser chamado pelo cd.yml
    outputs:
      image_tag:
        description: "Tag da imagem construída"
        value: ${{ jobs.build-and-test.outputs.image_tag }}

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build → Staging → Smoke Tests
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository_owner }}/used-cars-ml

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Build da imagem Docker ───────────────────────────────────────────────
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=staging

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to:   type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      # ── Subir ambiente staging ───────────────────────────────────────────────
      - name: Start staging environment
        env:
          DOCKER_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging
          API_KEY: ${{ secrets.STAGING_API_KEY || 'staging-test-key' }}
          CORS_ORIGINS: "http://localhost:8601"
        run: |
          docker compose -f docker-compose.staging.yml up -d
          echo "Aguardando serviços ficarem saudáveis..."

      - name: Wait for staging API to be healthy
        run: |
          max_wait=90
          elapsed=0
          until curl -sf http://localhost:8100/health; do
            if [ "$elapsed" -ge "$max_wait" ]; then
              echo "API não respondeu após ${max_wait}s"
              docker compose -f docker-compose.staging.yml logs app
              exit 1
            fi
            sleep 3
            elapsed=$((elapsed + 3))
          done
          echo "API saudável após ${elapsed}s"

      # ── Smoke tests ───────────────────────────────────────────────────────────
      - name: Set up Python for smoke tests
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install smoke test dependencies
        run: pip install pytest requests

      - name: Run smoke tests
        id: smoke
        env:
          API_BASE_URL: http://localhost:8100
          API_KEY: ${{ secrets.STAGING_API_KEY || 'staging-test-key' }}
          SMOKE_TIMEOUT: "15"
        run: |
          pytest tests/smoke/ -v \
            --tb=short \
            --junit-xml=smoke-results.xml \
            -p no:cacheprovider

      # ── Publicar resultados ───────────────────────────────────────────────────
      - name: Publish smoke test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: smoke-results.xml
          check_name: "Smoke Tests (staging)"

      # ── Rollback se smoke falhou ──────────────────────────────────────────────
      - name: Rollback — show staging logs on failure
        if: failure() && steps.smoke.outcome == 'failure'
        run: |
          echo "::error::Smoke tests falharam — rollback automático (staging derrubado)"
          docker compose -f docker-compose.staging.yml logs --tail=100
          docker compose -f docker-compose.staging.yml down -v

      # ── Teardown do staging ───────────────────────────────────────────────────
      - name: Teardown staging environment
        if: always()
        run: docker compose -f docker-compose.staging.yml down -v --remove-orphans
