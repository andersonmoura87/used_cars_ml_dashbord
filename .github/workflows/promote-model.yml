name: Promote Model to Production

# Acionado manualmente via GitHub UI ou API — requer aprovação de revisor
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    inputs:
      model_version:
        description: "Versão do modelo a promover (apenas dígitos; vazio = mais recente de Staging)"
        required: false
        type: string
      target_stage:
        description: "Stage de destino"
        required: true
        default: Production
        type: choice
        options:
          - Staging
          - Production
          - Archived
      reason:
        description: "Motivo da promoção (para auditoria — máx 200 chars)"
        required: true
        type: string

# M-10 FIX: least-privilege — apenas leitura por default
permissions:
  contents: read

jobs:
  promote:
    name: Promote to ${{ inputs.target_stage }}
    runs-on: ubuntu-latest
    # Garante que só roda via workflow_dispatch (chamada manual/API)
    if: github.event_name == 'workflow_dispatch'
    # environment: production  — descomente após criar o environment no GitHub:
    #   Settings → Environments → New environment → "production"
    #   e adicione "Required reviewers" para aprovação antes de rodar

    permissions:
      contents: read

    # Expõe o secret como env var de job — permite uso em if: de steps
    # (secrets não é contexto válido em expressões if: de step)
    env:
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install mlflow
        run: pip install mlflow==2.19.0

      # H-08 FIX: validar inputs ANTES de qualquer uso no shell
      - name: Validate inputs
        run: |
          VERSION="${{ inputs.model_version }}"
          if [ -n "$VERSION" ] && ! echo "$VERSION" | grep -qE '^[0-9]+$'; then
            echo "::error::model_version deve conter apenas dígitos. Recebido: '$VERSION'"
            exit 1
          fi

      # ── Listar versões antes da promoção ──────────────────────────────────
      - name: List current model versions
        env:
          MLFLOW_TRACKING_URI:     ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_REGISTERED_MODEL: ${{ secrets.MLFLOW_REGISTERED_MODEL }}
        run: python scripts/promote_model.py --list

      # H-08 FIX: inputs passados via env vars, não interpolados no shell
      - name: Promote model
        env:
          MLFLOW_TRACKING_URI:     ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_REGISTERED_MODEL: ${{ secrets.MLFLOW_REGISTERED_MODEL }}
          GITHUB_ACTOR:            ${{ github.actor }}
          MODEL_VERSION:           ${{ inputs.model_version }}
          TARGET_STAGE:            ${{ inputs.target_stage }}
        run: |
          ARGS=(--to "$TARGET_STAGE")
          if [ -n "$MODEL_VERSION" ]; then
            ARGS+=(--version "$MODEL_VERSION")
          else
            ARGS+=(--from-stage Staging)
          fi
          python scripts/promote_model.py "${ARGS[@]}"

      # M-09 FIX: reason passado via env var, sem interpolação direta
      - name: Record promotion reason
        env:
          PROMOTION_REASON: ${{ inputs.reason }}
          PROMOTION_ACTOR:  ${{ github.actor }}
          PROMOTION_REF:    ${{ github.ref_name }}
          PROMOTION_STAGE:  ${{ inputs.target_stage }}
        run: |
          {
            echo "## Promoção de Modelo — $PROMOTION_STAGE"
            echo ""
            echo "**Motivo:** $PROMOTION_REASON"
            echo ""
            echo "**Aprovado por:** @$PROMOTION_ACTOR | **Ref:** \`$PROMOTION_REF\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Slack
        # env.SLACK_WEBHOOK é válido em if: — secrets não é (causa YAML validation error)
        if: ${{ env.SLACK_WEBHOOK != '' }}
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ env.SLACK_WEBHOOK }}
          SLACK_MESSAGE: >
            :robot_face: Modelo promovido para *${{ inputs.target_stage }}*
            por @${{ github.actor }}.
          SLACK_COLOR: ${{ inputs.target_stage == 'Production' && 'good' || '#439FE0' }}
