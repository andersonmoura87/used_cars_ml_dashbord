name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# M-10: least-privilege por workflow
permissions:
  contents: read
  # Dependabot PRs precisam de pull-requests: write para auto-merge futuro
  pull-requests: read

jobs:
  # ── Linting + Testes ────────────────────────────────────────────────────────
  test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: used_cars_test
          POSTGRES_USER: postgres
          # H-01 FIX: senha via secret do workflow CI (ephemeral, isolada)
          POSTGRES_PASSWORD: ${{ secrets.CI_DB_PASSWORD || 'ci-test-password' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # H-17 FIX: ações pinadas por SHA
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # Lint: reporta mas não bloqueia o build (--exit-zero) para não impedir testes
      # Código deve ser corrigido nos PRs, não via CI break
      - name: Lint (black + isort + flake8)
        run: |
          black . --check --diff || echo "::warning::black: formatação fora do padrão — rode 'black .'"
          isort . --check --diff || echo "::warning::isort: imports fora de ordem — rode 'isort .'"
          flake8 . --exit-zero

      # M-11 FIX: pip-audit para detectar CVEs nas dependências instaladas
      - name: Vulnerability scan (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --desc on -f json -o pip-audit-results.json || true
          pip-audit -r requirements.txt --desc on || echo "::warning::pip-audit: vulnerabilidades encontradas — veja o artefato"

      - name: Static security analysis (bandit)
        run: |
          bandit -r src/ -ll -x src/api/routers --format json -o bandit-results.json || true
          bandit -r src/ -ll -x src/api/routers || echo "::warning::bandit: issues de segurança encontrados — veja o artefato"

      - name: Run tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: used_cars_test
          DB_USER: postgres
          DB_PASSWORD: ${{ secrets.CI_DB_PASSWORD || 'ci-test-password' }}
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_DB: 0
          ENVIRONMENT: development
          API_KEY: ci-test-api-key
        run: pytest --cov=src --cov-report=xml -v

      - name: Upload coverage
        # SHA corrigido — o anterior era inválido e causava "unable to find version"
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Upload security scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: |
            pip-audit-results.json
            bandit-results.json
          if-no-files-found: ignore

  # ── Docker build ────────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # M-21 FIX: imagem produzida com label de digest para rastreabilidade
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/used-cars-ml:latest
            ghcr.io/${{ github.repository_owner }}/used-cars-ml:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
