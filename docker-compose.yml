services:
  app:
    build: .
    ports:
      - "8000:8000"  # API
      - "8501:8501"  # Dashboard
    volumes:
      - .:/app
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=used_cars
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_WORKERS=4
      - API_RELOAD=true
      - DASHBOARD_PORT=8501
      - LOG_LEVEL=INFO
      - LOG_FILE=logs/app.log
      - CACHE_TTL=3600
      - BATCH_SIZE=1000
      - MAX_WORKERS=4
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=used_cars
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db

  mlflow:
    build:
      context: ./docker/mlflow
      dockerfile: Dockerfile
    command:
      - "--backend-store-uri"
      - "sqlite:///mlflow/mlflow.db"
      - "--default-artifact-root"
      - "/mlflow/artifacts"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "5000"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_db:/mlflow
      - mlflow_artifacts:/mlflow/artifacts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
  mlflow_db:
  mlflow_artifacts: 